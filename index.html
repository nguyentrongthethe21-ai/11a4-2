<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm 11A4 - Cloud Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; --success: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn-main { background: var(--p); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-bar button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #64748b; }
        .nav-bar .active { color: var(--p); border-top: 3px solid var(--p); }
        .sync-status { font-size: 11px; text-align: center; color: #10b981; margin-top: 5px; }
    </style>
</head>
<body>

<div id="play-page">
    <h2 style="text-align: center;">LUYỆN TẬP 11A4</h2>
    <div id="quiz-container" class="card">
        <div id="play-progress"></div>
        <div id="play-question" style="font-size: 18px; font-weight: bold; margin: 15px 0;"></div>
        <div id="play-options"></div>
        <button id="submit-btn" class="btn-main" onclick="handleSubmit()">Xác nhận</button>
        <button id="next-btn" class="btn-main hidden" onclick="nextQ()">Câu tiếp theo ▶</button>
    </div>
</div>

<div id="edit-page" class="hidden">
    <h2 style="text-align: center;">QUẢN LÝ DỮ LIỆU ĐÁM MÂY</h2>
    <div class="card">
        <p id="status" class="sync-status">Đang kết nối đám mây...</p>
        <button class="btn-main" style="background:#4f46e5" onclick="document.getElementById('file-input').click()">📄 Nhập file Word mới</button>
        <input type="file" id="file-input" class="hidden" accept=".docx" onchange="handleWordFile(event)">
    </div>
    <div id="edit-list"></div>
</div>

<div class="nav-bar">
    <button id="nav-play" class="active" onclick="showPage('play')">Làm bài</button>
    <button id="nav-edit" onclick="showPage('edit')">Cài đặt</button>
</div>

<script>
    // --- CẤU HÌNH FIREBASE CỦA BẠN ---
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        databaseURL: "https://tên-dự-án-của-bạn.firebaseio.com",
        projectId: "tên-dự-án",
        storageBucket: "tên-dự-án.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let questions = [];

    // Lắng nghe thay đổi từ Cloud - Đồng bộ liên tục
    db.ref('quizData').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            questions = data;
            document.getElementById('status').innerText = "✅ Đã đồng bộ với máy chủ";
            if(document.getElementById('edit-page').classList.contains('hidden') === false) renderEditList();
        }
    });

    function saveToCloud() {
        db.ref('quizData').set(questions);
    }

    // --- LOGIC LÀM BÀI ---
    let currentQuestions = [], currentIdx = 0, correctCount = 0;

    function prepareQuiz() {
        if(questions.length === 0) return;
        currentQuestions = JSON.parse(JSON.stringify(questions)).sort(() => Math.random() - 0.5);
        currentIdx = 0; correctCount = 0;
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIdx];
        document.getElementById('play-question').innerText = q.q;
        const box = document.getElementById('play-options');
        box.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.style = "display:block; width:100%; margin:5px 0; padding:10px; border:1px solid #ddd; border-radius:5px; background:#f9f9f9; text-align:left;";
            btn.onclick = () => { /* Logic chọn đáp án */ };
            box.appendChild(btn);
        });
        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
    }

    // Các hàm handleWordFile, parsePro, renderEditList tương tự như các bản trước 
    // nhưng thay vì gọi save() vào LocalStorage, hãy gọi saveToCloud().

    function showPage(p) {
        document.getElementById('play-page').classList.toggle('hidden', p !== 'play');
        document.getElementById('edit-page').classList.toggle('hidden', p !== 'edit');
        if(p === 'play') prepareQuiz();
        document.getElementById('nav-play').className = p === 'play' ? 'active' : '';
        document.getElementById('nav-edit').className = p === 'edit' ? 'active' : '';
    }
</script>
</body>
</html>
