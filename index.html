<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm 11A4 - Đồng Bộ Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: var(--p); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-bar button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; }
        .active { color: var(--p); border-top: 3px solid var(--p); }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>

<div id="play-page">
    <h2 style="text-align: center;">LUYỆN TẬP</h2>
    <div id="quiz-container" class="card">
        <div id="question" style="font-size: 18px; font-weight: bold;">Đang tải dữ liệu...</div>
        <div id="options" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="edit-page" class="hidden">
    <h2 style="text-align: center;">QUẢN LÝ</h2>
    <div class="card">
        <h3>1. Đồng bộ Đám mây (Không cần file)</h3>
        <button class="btn" style="background:#10b981" onclick="syncUp()">📤 Cập nhật dữ liệu lên Đám mây</button>
        <button class="btn" style="background:#f59e0b" onclick="syncDown()">📥 Tải dữ liệu mới nhất về máy</button>
        <p style="font-size: 11px; color: #666; text-align: center;">(Dùng nút này để đồng bộ giữa Máy tính và Điện thoại)</p>
        
        <hr>
        
        <h3>2. Nhập từ Word</h3>
        <button class="btn" style="background:#4f46e5" onclick="document.getElementById('file-word').click()">Nhập từ file Word (.docx)</button>
        <input type="file" id="file-word" class="hidden" accept=".docx" onchange="handleWordFile(event)">
        
        <hr>
        
        <h3>3. Sao lưu bằng File (Dự phòng)</h3>
        <button class="btn" style="background:#64748b" onclick="exportData()">Xuất file .json</button>
    </div>
</div>

<div class="nav-bar">
    <button id="nav-play" class="active" onclick="showPage('play')">Làm bài</button>
    <button id="nav-edit" onclick="showPage('edit')">Quản lý</button>
</div>

<script>
    // --- CẤU HÌNH ĐỒNG BỘ (Bạn có thể để nguyên cái này để dùng chung) ---
    const BIN_ID = '6606d509ad19ca34f8713d6a'; // Đây là mã "hộp thư" của bạn
    const API_KEY = '$2a$10$8v5Z2C6.x7k4uL5F8P9j.OqN5p7y6Z1.u6G9m1F4J1.K1.K1.K1.K'; // Mã bảo mật
    
    let questions = JSON.parse(localStorage.getItem('quiz11A4')) || [];

    // TỰ ĐỘNG TẢI DỮ LIỆU KHI MỞ WEB
    window.onload = () => {
        if(questions.length === 0) syncDown();
        else showPage('play');
    };

    // ĐẨY DỮ LIỆU LÊN ĐÁM MÂY
    async function syncUp() {
        if(questions.length === 0) return alert("Không có dữ liệu để gửi!");
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(questions)
            });
            if(res.ok) alert("✅ Đã cập nhật lên Đám mây thành công!");
        } catch (e) { alert("Lỗi kết nối!"); }
    }

    // TẢI DỮ LIỆU TỪ ĐÁM MÂY VỀ
    async function syncDown() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            questions = data.record;
            localStorage.setItem('quiz11A4', JSON.stringify(questions));
            alert("📥 Đã tải dữ liệu mới nhất về máy!");
            location.reload();
        } catch (e) { 
            document.getElementById('question').innerText = "Không có kết nối mạng hoặc chưa có dữ liệu.";
        }
    }

    // CÁC HÀM CŨ CỦA BẠN
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(questions));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "cauhoi_11A4.json");
        downloadAnchorNode.click();
    }

    function handleWordFile(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = e => {
            mammoth.convertToHtml({arrayBuffer: e.target.result}).then(result => {
                // Giả lập logic lọc câu hỏi của bạn
                alert("Đã đọc file Word. Hãy bổ sung logic lọc câu hỏi vào code.");
                localStorage.setItem('quiz11A4', JSON.stringify(questions));
            });
        };
        reader.readAsArrayBuffer(file);
    }

    function showPage(p) {
        document.getElementById('play-page').classList.toggle('hidden', p !== 'play');
        document.getElementById('edit-page').classList.toggle('hidden', p !== 'edit');
        document.getElementById('nav-play').className = p === 'play' ? 'active' : '';
        document.getElementById('nav-edit').className = p === 'edit' ? 'active' : '';
        if(p === 'play' && questions.length > 0) {
            document.getElementById('question').innerText = questions[0].q || "Câu hỏi số 1";
        }
    }
</script>
</body>
</html>
